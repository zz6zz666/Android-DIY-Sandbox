name: android_diy_sandbox
description: Android DIY Sandbox
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 0.2.2+7
environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # pub repo
  signale: ^0.0.9
  intl: ^0.19.0
  archive: ^4.0.7
  async: ^2.11.0
  dio: ^5.7.0
  crypto: ^3.0.6
  convert: ^3.1.1
  cupertino_icons: ^1.0.2
  get: ^4.6.5
  device_info_plus: ^11.1.1
  package_info_plus: ^9.0.1
  tar: ^2.0.0
  path: ^1.9.1
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.10.0
  permission_handler: ^11.3.1
  http: ^1.2.2
  url_launcher: ^6.3.1
  file_picker: ^11.0.2
  flutter_markdown_plus: ^1.0.11
  ffi: ^2.1.3

  # get repo
  xterm:
    git:
      url: https://github.com/TerminalStudio/xterm.dart
      ref: master
  settings:
    git: https://github.com/nightmare-space/settings
  flutter_pty:
    git: https://github.com/TerminalStudio/flutter_pty
  global_repository:
    git: https://github.com/nightmare-space/global_repository
  behavior_api:
    git:
      url: https://github.com/nightmare-space/empty_package
      path: behavior_api
  flutter_foreground_task: ^9.1.0
  sqlite3: ^3.3.4
  sqlite3_flutter_libs: ^0.6.0+eol

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  intl_utils: ^2.8.7

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/love_host.lua
    - assets/scripts/
    - assets/scripts/games/
    - assets/scripts/games/demo/
    - assets/scripts/games/runner/
    - assets/scripts/games/bounce/
    - assets/scripts/games/syscheck/
    - assets/scripts/games/audio_svc/
    - assets/scripts/widgets/
    - assets/scripts/apps/
    - assets/scripts/music/
    - assets/scripts/agent.lua
    - assets/scripts/agent/
    - assets/scripts/agent/main.lua
    - assets/scripts/agent/sandbox
    - assets/scripts/main.lua
    - assets/scripts/AGENTS.md
    - assets/scripts/games/demo/main.lua
    - assets/scripts/games/runner/main.lua
    - assets/scripts/games/bounce/main.lua
    - assets/scripts/games/syscheck/main.lua
    - assets/scripts/games/syscheck/conf.lua
    - assets/scripts/games/audio_svc/main.lua

flutter_intl:
  enabled: true
